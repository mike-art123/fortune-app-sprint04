<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Fortune — a calm Telegram Mini App for reflective readings.">

  <!-- Telegram Mini Apps must not zoom; lock the viewport. -->
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <title>Fortune</title>
  <link rel="manifest" href="manifest.json">

  <!-- Telegram WebApp SDK: exposes window.Telegram.WebApp (initData, etc.).
       Loaded before Flutter so the bridge sees it at startup. -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
