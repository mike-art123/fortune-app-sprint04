# Extends the shared base (packages/lint_rules). Strict, RTL-aware, premium.
include: package:flutter_lints/flutter.yaml
analyzer:
  language:
    strict-casts: true
    strict-raw-types: true
  errors:
    invalid_annotation_target: ignore
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
linter:
  rules:
    prefer_const_constructors: true
    avoid_print: true
    require_trailing_commas: true
