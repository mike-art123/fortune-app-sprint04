# Extends the shared base (packages/lint_rules). Strict, RTL-aware, premium.
include: package:flutter_lints/flutter.yaml
# The codebase is written at 100 columns (matching the backend's prettier
# printWidth). Requires the Dart 3.7+ formatter.
formatter:
  page_width: 100
analyzer:
  language:
    strict-casts: true
    strict-raw-types: true
  errors:
    invalid_annotation_target: ignore
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
linter:
  rules:
    prefer_const_constructors: true
    avoid_print: true
    require_trailing_commas: true
