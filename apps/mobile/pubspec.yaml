name: fortune_app
description: Fortune App — a calm, premium, Persian-first fortune experience.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.6.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management + DI (single system, per doc 51 §55)
  flutter_riverpod: ^2.5.1

  # Navigation (single system)
  go_router: ^14.2.0

  # Networking (single HTTP client, wrapped by ApiClient)
  dio: ^5.5.0

  # Persistence
  flutter_secure_storage: ^9.2.2   # tokens only
  shared_preferences: ^2.3.0       # non-sensitive preferences

  # Platform / utility
  connectivity_plus: ^6.0.5        # connectivity hint only
  intl: ^0.19.0
  uuid: ^4.4.2                     # request correlation ids

  # Serialization annotations (generators are dev-only)
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  generate: true
