name: Bootstrap lockfile
on:
  push:
    branches: [main]
permissions:
  contents: write
jobs:
  lockfile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Generate and commit package-lock.json (once)
        run: |
          if [ -f package-lock.json ]; then
            echo "lockfile already exists - nothing to do"
            exit 0
          fi
          npm install --package-lock-only
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          git commit -m "chore: add package-lock.json (generated on CI)"
          git push
