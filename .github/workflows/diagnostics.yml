name: Diagnostics
on: { push: { branches: [main] } }
permissions: { contents: write }
concurrency: diagnostics
jobs:
  diag:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    services:
      postgres:
        image: postgres:16-alpine
        env: { POSTGRES_USER: fortune, POSTGRES_PASSWORD: fortune, POSTGRES_DB: fortune_test }
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U fortune" --health-interval 5s --health-timeout 3s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping" --health-interval 5s --health-timeout 3s --health-retries 10
    env:
      DATABASE_URL: postgresql://fortune:fortune@localhost:5432/fortune_test?schema=public
      REDIS_HOST: localhost
      NODE_ENV: test
      TELEGRAM_BOT_TOKEN: "7654321:AAF-ci-test-token"
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - uses: subosito/flutter-action@v2
        with: { channel: stable }
      - name: capture
        run: |
          exec > FULL-DIAG.txt 2>&1
          echo "# FULL-DIAG ($(date -u +%FT%TZ) ${GITHUB_SHA})"
          echo ""
          echo "## API"
          npm ci > /tmp/ci.log 2>&1 && echo "npm ci: ok" || { echo "npm ci: FAIL"; tail -20 /tmp/ci.log; }
          npm --workspace apps/api run prisma:generate > /tmp/pg.log 2>&1 && echo "prisma generate: ok" || { echo "prisma generate: FAIL"; tail -20 /tmp/pg.log; }
          npx --workspace apps/api prisma migrate deploy > /tmp/md.log 2>&1 && echo "migrate deploy: ok" || { echo "migrate deploy: FAIL"; tail -20 /tmp/md.log; }
          for step in api:format:check api:lint api:test api:e2e api:build; do
            echo ""
            echo "=== $step ==="
            if npm run "$step" > /tmp/s.log 2>&1; then echo "PASS $step"; else echo "FAIL $step"; echo "--- error-level app logs ---"; grep -iE '"level":(50|60)|"err"|stack|ERROR \[|Exception|instanceof' /tmp/s.log | head -40; echo "--- tail ---"; tail -70 /tmp/s.log; fi
          done
          echo ""
          echo "## MOBILE"
          ( cd apps/mobile && flutter pub get > /tmp/pub.log 2>&1 ) && echo "pub get: ok" || { echo "pub get: FAIL"; tail -10 /tmp/pub.log; }
          echo ""
          echo "=== dart format check ==="
          if ( cd apps/mobile && dart format --output=none --set-exit-if-changed . > /tmp/fmt.log 2>&1 ); then echo "PASS format"; else echo "FAIL format"; tail -30 /tmp/fmt.log; fi
          ( cd apps/mobile && flutter gen-l10n > /dev/null 2>&1 ) && echo "gen-l10n: ok" || echo "gen-l10n: FAIL"
          echo ""
          echo "=== flutter analyze ==="
          if ( cd apps/mobile && flutter analyze > /tmp/an.log 2>&1 ); then echo "PASS analyze"; else echo "FAIL analyze"; tail -30 /tmp/an.log; fi
          echo ""
          echo "=== flutter test ==="
          if ( cd apps/mobile && flutter test > /tmp/tst.log 2>&1 ); then echo "PASS test"; else echo "FAIL test"; tail -50 /tmp/tst.log; fi
      - name: push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "bot@users.noreply.github.com"
          git checkout -- . 2>/dev/null || true
          git clean -fd apps 2>/dev/null || true
          git add FULL-DIAG.txt
          git pull --rebase origin main || true
          git diff --cached --quiet || (git commit -m "diag: full api+mobile output" && git push)
