name: Diagnostics
on: { push: { branches: [main] } }
permissions: { contents: write }
concurrency: diagnostics
jobs:
  diag:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: subosito/flutter-action@v2
        with: { channel: stable }
      - name: analyze
        run: |
          {
            echo "# ANALYZE ($(date -u +%FT%TZ) ${GITHUB_SHA})"
            cd apps/mobile
            flutter pub get 2>&1 | tail -n 5
            echo "=== flutter analyze ==="
            flutter analyze 2>&1 | tail -n 100
          } > ANALYZE.txt || true
          mv apps/mobile/ANALYZE.txt ANALYZE.txt 2>/dev/null || true
      - name: push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "bot@users.noreply.github.com"
          git checkout -- apps/mobile 2>/dev/null || true
          git add ANALYZE.txt
          git pull --rebase origin main || true
          git diff --cached --quiet || (git commit -m "diag: analyze output" && git push)
