# One-shot formatter normalization (Sprint 04B).
#
# format:check (prettier) and `dart format --set-exit-if-changed` had never
# been executable in the authoring environment (no npm registry / no Dart
# SDK there), so the tree was written by hand without a formatter pass. This
# workflow runs the REAL formatters on a runner and commits the result as
# github-actions[bot] — the same pattern bootstrap-lockfile.yml used for
# package-lock.json. It is effectively a no-op once the tree is normalized
# (commits only when there is a diff).
#
# Note: pushes made with GITHUB_TOKEN do not retrigger workflows, so CI will
# validate the formatted tree on the next human-authored push.
name: Auto-format
on:
  push: { branches: [main] }

permissions:
  contents: write

concurrency: auto-format

jobs:
  format:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      # Prettier over the API workspace — exactly what api:format:check checks.
      - run: npm --workspace apps/api run format
      - uses: subosito/flutter-action@v2
        with: { channel: stable }
      # pub get FIRST: without it the analysis_options include fails to
      # resolve and the formatter silently falls back to the default 80-col
      # page width instead of the repo's page_width: 100 — producing output
      # that the CI gate (which runs after pub get) rejects.
      - run: cd apps/mobile && flutter pub get
      - run: cd apps/mobile && dart format .
      - name: Commit formatter output (if any)
        run: |
          if ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "style: apply prettier + dart format (one-shot tree normalization)"
            git push
          else
            echo "Tree already formatted — nothing to commit."
          fi
