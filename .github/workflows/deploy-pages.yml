name: Deploy Web (Cloudflare Pages)

# Builds the Flutter Web PRODUCTION flavor against the live Railway API and
# publishes apps/mobile/build/web to the Cloudflare Pages project "bakhtnegar"
# via Wrangler.
#
# Stays GREEN (job skipped) until Cloudflare creds are present. To enable:
#   - repo VARIABLE  CLOUDFLARE_ACCOUNT_ID   = <your Cloudflare account id>   (gates the job)
#   - repo SECRET    CLOUDFLARE_API_TOKEN    = <token with "Cloudflare Pages: Edit">
# Optional overrides (sensible defaults are baked in below):
#   - repo VARIABLE  API_BASE_URL            = https://<api-domain>/api/v1
#   - repo VARIABLE  TELEGRAM_BOT_USERNAME   = bakhtnegarbot
# A Cloudflare Pages project named "bakhtnegar" must exist.

on:
  push:
    branches: [main]
    paths:
      - 'apps/mobile/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    # Account id is not secret; use it as the enable flag so the run stays green
    # (job skipped) until you configure the deploy.
    if: ${{ vars.CLOUDFLARE_ACCOUNT_ID != '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter --version

      - name: Install deps
        working-directory: apps/mobile
        run: flutter pub get

      - name: Generate localizations
        working-directory: apps/mobile
        run: flutter gen-l10n

      - name: Build web (production flavor, live Railway API)
        working-directory: apps/mobile
        run: >
          flutter build web --release
          -t lib/main_production.dart
          --dart-define=API_BASE_URL=${{ vars.API_BASE_URL || 'https://fortune-app-sprint04-production.up.railway.app/api/v1' }}
          --dart-define=TELEGRAM_BOT_USERNAME=${{ vars.TELEGRAM_BOT_USERNAME || 'bakhtnegarbot' }}

      - name: SPA routing fallback (deep links / refresh must not 404)
        working-directory: apps/mobile
        run: printf '/*    /index.html    200\n' > build/web/_redirects

      - name: Publish to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/mobile/build/web --project-name=bakhtnegar --branch=main
